<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Career Counselor - Sign In</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: dark;
            font-family: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #07111f, #14213d 60%, #1d3557);
            color: #f8fbff;
            overflow: hidden;
            position: relative;
        }

        /* Glowing background orbs */
        .bg-glow {
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            z-index: 0;
            pointer-events: none;
        }

        .bg-glow-1 {
            background: #4f8cff;
            top: 15%;
            left: 20%;
            animation: floatOrb 18s ease-in-out infinite alternate;
        }

        .bg-glow-2 {
            background: #6f61ff;
            bottom: 15%;
            right: 20%;
            animation: floatOrb 18s ease-in-out infinite alternate-reverse;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(60px, 40px) scale(1.1);
            }
        }

        .card-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -50%;
            width: 200%;
            height: 100%;
            background: linear-gradient(to right,
                    transparent,
                    rgba(255, 255, 255, 0.02),
                    transparent);
            transform: skewX(-25deg);
            pointer-events: none;
        }

        .header-container {
            text-align: center;
            margin-bottom: 28px;
        }

        .pill {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 999px;
            background: rgba(79, 140, 255, 0.12);
            color: #8bb4ff;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 16px;
            border: 1px solid rgba(79, 140, 255, 0.2);
            box-shadow: 0 4px 12px rgba(79, 140, 255, 0.05);
        }

        h2 {
            margin: 0 0 6px 0;
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #d2e4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            margin: 0;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Tabs styling */
        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.25);
            padding: 4px;
            border-radius: 14px;
            margin-bottom: 28px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            padding: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-btn:hover {
            color: rgba(255, 255, 255, 0.9);
        }

        .tab-btn.active {
            background: linear-gradient(90deg, #4f8cff, #6f61ff);
            color: #fff;
            box-shadow: 0 4px 15px rgba(79, 140, 255, 0.3);
        }

        /* Form elements */
        form {
            display: flex;
            flex-direction: column;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.8);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 12px 16px;
            padding-right: 44px;
            /* Space for the visibility toggle */
            border-radius: 12px;
            font-size: 0.95rem;
            transition: all 0.25s ease;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #4f8cff;
            box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.15);
            background: rgba(0, 0, 0, 0.3);
        }

        /* Password visibility toggle */
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            transition: color 0.2s ease;
            user-select: none;
        }

        .password-toggle:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        /* Collapsible Sign Up specific fields */
        .collapsible {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.3s cubic-bezier(0, 1, 0, 1), opacity 0.3s ease, margin 0.3s ease;
            margin-bottom: 0;
        }

        .collapsible.visible {
            max-height: 100px;
            opacity: 1;
            margin-bottom: 20px;
            transition: max-height 0.3s cubic-bezier(0.5, 0, 1, 0.5), opacity 0.3s ease, margin 0.3s ease;
        }

        /* Error Banner styling */
        .error-banner {
            background: rgba(255, 79, 79, 0.1);
            border: 1px solid rgba(255, 79, 79, 0.2);
            color: #ffb4b4;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.88rem;
            display: none;
            align-items: center;
            gap: 10px;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-icon {
            flex-shrink: 0;
            display: inline-flex;
            width: 18px;
            height: 18px;
            color: #ff7f7f;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(90deg, #4f8cff, #6f61ff);
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(111, 97, 255, 0.2);
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(111, 97, 255, 0.35);
            background: linear-gradient(90deg, #5b95ff, #7c70ff);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Spinner for loading state */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <!-- Ambient glowing backgrounds -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="card-container">
        <div class="card">
            <!-- App Branding -->
            <div class="header-container">
                <span class="pill">🎓 Smart AI Career Counselor</span>
                <h2 id="card-title">Sign In</h2>
                <p class="subtitle" id="card-subtitle">Connect to access personalized career roadmaps</p>
            </div>

            <!-- Tab Selector -->
            <div class="tabs">
                <button type="button" class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign
                    In</button>
                <button type="button" class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <!-- Inline Error Banner -->
            <div class="error-banner" id="error-banner">
                <svg class="error-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
                <span id="error-text">An error occurred. Please try again.</span>
            </div>

            <!-- Form -->
            <form id="auth-form" onsubmit="handleAuth(event)">
                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="name@example.com" required autocomplete="email">
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="Enter your password" required
                            autocomplete="current-password">
                        <span class="password-toggle" onclick="togglePasswordVisibility('password')">
                            <!-- Eye icon -->
                            <svg id="eye-icon-password" xmlns="http://www.w3.org/2000/svg" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor" width="20" height="20">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </span>
                    </div>
                </div>

                <!-- Confirm Password (hidden in login mode) -->
                <div class="form-group collapsible" id="confirm-password-group">
                    <label for="confirm-password">Confirm Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirm-password" placeholder="Confirm your password"
                            autocomplete="new-password">
                        <span class="password-toggle" onclick="togglePasswordVisibility('confirm-password')">
                            <!-- Eye icon -->
                            <svg id="eye-icon-confirm" xmlns="http://www.w3.org/2000/svg" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor" width="20" height="20">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </span>
                    </div>
                </div>

                <!-- Action Button -->
                <button type="submit" class="btn-submit" id="auth-submit-btn">
                    <span id="btn-text">Sign In</span>
                    <span class="spinner" id="btn-spinner"></span>
                </button>
            </form>
        </div>
    </div>

    <!-- Firebase SDK Logic -->
    <script type="module">
        // Import modules from Firebase v10 CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyD4Hc01w6OwHgGcPGr-sU7k3UUNJ9WeTvM",
            authDomain: "sushrut-psuy.firebaseapp.com",
            projectId: "sushrut-psuy",
            storageBucket: "sushrut-psuy.firebasestorage.app",
            messagingSenderId: "150900498930",
            appId: "1:150900498930:web:0e0c7bf2efdec841020b6b",
            measurementId: "G-44EZ4YH6JG"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let currentMode = 'login';

        // Set functions on the window object so inline HTML attributes can call them
        window.switchTab = function (mode) {
            currentMode = mode;
            const tabLogin = document.getElementById('tab-login');
            const tabSignup = document.getElementById('tab-signup');
            const confirmGroup = document.getElementById('confirm-password-group');
            const title = document.getElementById('card-title');
            const subtitle = document.getElementById('card-subtitle');
            const btnText = document.getElementById('btn-text');
            const errorBanner = document.getElementById('error-banner');

            // Reset any active error state
            errorBanner.style.display = 'none';

            if (mode === 'login') {
                tabLogin.classList.add('active');
                tabSignup.classList.remove('active');
                confirmGroup.classList.remove('visible');
                document.getElementById('confirm-password').required = false;
                title.innerText = "Sign In";
                subtitle.innerText = "Connect to access personalized career roadmaps";
                btnText.innerText = "Sign In";
            } else {
                tabSignup.classList.add('active');
                tabLogin.classList.remove('active');
                confirmGroup.classList.add('visible');
                document.getElementById('confirm-password').required = true;
                title.innerText = "Create Account";
                subtitle.innerText = "Sign up for smart AI career guidance";
                btnText.innerText = "Sign Up";
            }
        };

        window.togglePasswordVisibility = function (inputId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(inputId === 'password' ? 'eye-icon-password' : 'eye-icon-confirm');

            if (input.type === 'password') {
                input.type = 'text';
                // Switch eye icon design to "slashed eye"
                icon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.024 10.024 0 014.502-5.903M15 12a3 3 0 11-6 0 3 3 0 016 0zm-3-7c.18 0 .359.006.538.019M19.071 4.929l-14.14 14.14M12 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-2.203 3.978M13.875 18.825L9.625 14.575" />
                `;
            } else {
                input.type = 'password';
                // Reset eye icon design
                icon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                `;
            }
        };

        window.handleAuth = async function (event) {
            event.preventDefault();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirm-password").value;
            const errorBanner = document.getElementById("error-banner");
            const errorText = document.getElementById("error-text");
            const submitBtn = document.getElementById("auth-submit-btn");
            const spinner = document.getElementById("btn-spinner");
            const btnText = document.getElementById("btn-text");

            errorBanner.style.display = 'none';

            // Basic fields validation
            if (!email || !password) {
                showError("Please enter both an email and a password.");
                return;
            }

            if (currentMode === 'signup') {
                if (password !== confirmPassword) {
                    showError("Passwords do not match.");
                    return;
                }
                if (password.length < 6) {
                    showError("Password should be at least 6 characters.");
                    return;
                }
            }

            // Set Loading state
            submitBtn.disabled = true;
            spinner.style.display = 'block';
            const originalBtnText = btnText.innerText;
            btnText.innerText = currentMode === 'login' ? "Signing In..." : "Creating Account...";

            try {
                let userCredential;
                if (currentMode === 'signup') {
                    userCredential = await createUserWithEmailAndPassword(auth, email, password);
                } else {
                    userCredential = await signInWithEmailAndPassword(auth, email, password);
                }

                // Get Auth ID token
                const idToken = await userCredential.user.getIdToken();

                // Send Token to Flask
                const response = await fetch("/set-cookie", {
                    method: "POST",
                    credentials: "include",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ idToken: idToken })
                });

                if (response.ok) {
                    window.location.href = "/dashboard";
                } else {
                    const data = await response.json();
                    showError(data.message || "Failed to establish secure backend session.");
                    resetBtnState();
                }
            } catch (error) {
                let message = error.message;
                // Humanize Firebase auth errors
                if (error.code === 'auth/invalid-credential') {
                    message = "Incorrect email address or password.";
                } else if (error.code === 'auth/email-already-in-use') {
                    message = "This email is already in use by another account.";
                } else if (error.code === 'auth/weak-password') {
                    message = "Password is too weak. Please use at least 6 characters.";
                } else if (error.code === 'auth/invalid-email') {
                    message = "Please enter a valid email address.";
                } else if (error.code === 'auth/too-many-requests') {
                    message = "Access to this account has been temporarily disabled due to many failed login attempts. Reset your password or try again later.";
                } else {
                    // Strip the "Firebase:" prefix
                    message = message.replace(/^Firebase:\s*/, '');
                }
                showError(message);
                resetBtnState();
            }

            function resetBtnState() {
                submitBtn.disabled = false;
                spinner.style.display = 'none';
                btnText.innerText = originalBtnText;
            }
        };

        function showError(msg) {
            const errorBanner = document.getElementById("error-banner");
            const errorText = document.getElementById("error-text");
            errorText.innerText = msg;
            errorBanner.style.display = 'flex';
        }
    </script>
</body>

</html>
